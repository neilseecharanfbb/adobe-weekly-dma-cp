name: Adobe Weekly DMA by Segment (CP)
on:
  workflow_dispatch: {}
  schedule:
    # Tue 8pm ET => Wed 00:00 UTC during EDT, 01:00 UTC during EST.
    # Run both; guard ensures it only runs when it's exactly Tue 20:00 in America/New_York.
    - cron: "0 0 * * 3"
    - cron: "0 1 * * 3"
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Guard - proceed only at Tue 20:00 America/New_York
        id: guard
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("America/New_York"))
          should_run = (now.weekday() == 1 and now.hour == 20)  # Tue 8pm
          print("ET now:", now.isoformat())
          print("should_run:", should_run)
          with open("guard_out.txt", "w") as f:
              f.write("true" if should_run else "false")
          PY
          echo "run=$(cat guard_out.txt)" >> "$GITHUB_OUTPUT"
      - name: Run weekly (CP)
        if: true
        env:
          # Adobe
          AA_CLIENT_ID: ${{ secrets.AA_CLIENT_ID }}
          AA_CLIENT_SECRET: ${{ secrets.AA_CLIENT_SECRET }}
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          AA_ORG_ID: ${{ secrets.AA_ORG_ID }}
          AA_COMPANY_ID: ${{ secrets.AA_COMPANY_ID }}
          # Brand selection
          BRAND_KEYS: "CP"
          # FTP
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
          FTP_TLS:  "true"
          # Optional tuning
          PAGE_SIZE: "2000"
          WORKERS_PAGES: "8"
          WORKERS_SEGMENTS: "5"
        run: |
          python -m adobe_dma.weekly_github_cp
      - name: Upload artifact to GitHub (optional)
        if: true
        uses: actions/upload-artifact@v4
        with:
          name: adobe_dma_weekly_output_cp
          path: output/*.xlsx
          if-no-files-found: error
